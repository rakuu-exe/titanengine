<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#050505">
    <title>{% block title %}Titan Engine{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body data-current-path="{{ request.path }}">
    <div class="video-background" aria-hidden="true">
        <video id="appBackgroundVideo" autoplay muted loop playsinline preload="auto" disablepictureinpicture>
            <source src="{{ url_for('static', filename='videos/noire_night_v2.mp4') }}" type="video/mp4">
        </video>
    </div>
    <div class="video-overlay" aria-hidden="true"></div>
    <div class="page-shell">
        <header class="topbar">
            <a class="brand" href="{{ url_for('dashboard') }}">
                <span class="brand-mark">T</span>
                <span>
                    <strong>Titan Engine</strong>
                </span>
            </a>
            <nav class="nav" aria-label="Primary navigation">
                <a href="{{ url_for('dashboard') }}">Dashboard</a>
                <a href="{{ url_for('library') }}">Library</a>
                <a href="{{ url_for('notes') }}">Notes</a>
                <a href="{{ url_for('quizzes') }}">Quiz</a>
                <a href="{{ url_for('flashcards') }}">Flashcards</a>
                <a href="{{ url_for('schedules') }}">Schedule</a>
                <a href="{{ url_for('settings') }}">Settings</a>
            </nav>
        </header>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <section class="alerts" aria-label="Messages">
                    {% for category, message in messages %}
                        <div class="alert {{ category }}">{{ message }}</div>
                    {% endfor %}
                </section>
            {% endif %}
        {% endwith %}

        <main id="app-root" tabindex="-1">
            {% block content %}{% endblock %}
        </main>
    </div>
    <script src="{{ url_for('static', filename='app.js') }}" defer></script>
</body>
</html>
